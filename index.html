<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rover Commander V3.1 - Fail-Safe Edition</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #020305;
            --panel-bg: rgba(8, 15, 25, 0.7);
            --glass-border: rgba(0, 229, 255, 0.25);
            --cyan: #00e5ff;
            --blue: #0077ff;
            --red: #ff2a2a;
            --green: #00ff66;
            --yellow: #ffcc00;
            --text-main: #e0f0ff;
            --text-dim: #5c7894;
            --glow-cyan: 0 0 15px rgba(0, 229, 255, 0.5);
            --glow-red: 0 0 20px rgba(255, 42, 42, 0.6);
            --glow-green: 0 0 15px rgba(0, 255, 102, 0.5);
            --glow-yellow: 0 0 15px rgba(255, 204, 0, 0.5);
            
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at center, #07101d 0%, var(--bg-dark) 100%),
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            width: 100vw; height: 100vh;
            overflow: hidden;
        }

        /* Portrait Warning Overlay */
        #portrait-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-dark);
            z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }
        
        .rotate-icon {
            width: 80px; height: 80px; border: 4px solid var(--cyan); border-radius: 10px;
            position: relative; animation: rotatePhone 2s infinite ease-in-out; margin-bottom: 30px;
            box-shadow: var(--glow-cyan);
        }
        .rotate-icon::after {
            content: ''; position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 4px; background: var(--cyan); border-radius: 2px;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        #portrait-overlay h2 { font-family: 'Orbitron', sans-serif; color: var(--cyan); font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 10px; text-shadow: var(--glow-cyan); }
        #portrait-overlay p { font-size: 1.1rem; color: var(--text-dim); }

        @media screen and (orientation: portrait) {
            #portrait-overlay { display: flex; }
            #dashboard { display: none !important; }
        }

        /* Connecting Modal */
        #conn-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 5000;
            display: flex; justify-content: center; align-items: center;
        }
        .conn-box {
            background: var(--panel-bg); border: 1px solid var(--glass-border);
            padding: 30px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,229,255,0.1);
            text-align: center; width: 350px;
        }
        .conn-box h2 { font-family: 'Orbitron', sans-serif; color: var(--cyan); margin-bottom: 20px; font-size: 1.4rem; letter-spacing: 1px; }
        .ip-input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--cyan);
            color: var(--cyan); font-family: 'Orbitron', monospace; font-size: 1.1rem;
            border-radius: 6px; text-align: center; margin-bottom: 20px; outline: none; box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .ip-input:focus { box-shadow: var(--glow-cyan), inset 0 0 10px rgba(0,0,0,0.8); }
        .btn-connect {
            width: 100%; padding: 12px; background: rgba(0,229,255,0.1); border: 1px solid var(--cyan);
            color: var(--cyan); font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; border-radius: 6px; transition: 0.2s;
        }
        .btn-connect:hover { background: rgba(0,229,255,0.3); box-shadow: var(--glow-cyan); }
        .btn-connect:active { background: var(--cyan); color: #000; }
        .conn-status-msg { margin-top: 15px; font-size: 0.9rem; color: var(--yellow); font-family: 'Orbitron', monospace; height: 1.2em; }

        /* Disable overlay for safety locking */
        #lock-overlay {
            position: fixed; top: 55px; left: 0; width: 100vw; height: calc(100vh - 55px);
            background: rgba(40, 0, 0, 0.4); backdrop-filter: blur(2px);
            z-index: 4000; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .lock-msg { font-family: 'Orbitron', sans-serif; color: var(--red); font-size: 1.5rem; text-shadow: var(--glow-red); background: rgba(0,0,0,0.8); padding: 15px 30px; border: 1px solid var(--red); border-radius: 8px;}

        /* Main Dashboard Layout */
        #dashboard {
            display: flex; flex-direction: column;
            width: 100%; height: 100%;
            padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
            filter: blur(5px); transition: filter 0.5s; pointer-events: none;
        }
        #dashboard.active { filter: blur(0); pointer-events: auto; }

        /* --- Top Bar --- */
        .top-bar {
            height: 55px; flex-shrink: 0;
            background: linear-gradient(180deg, rgba(0,229,255,0.08) 0%, transparent 100%);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 10;
        }

        .brand { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 900; color: var(--cyan); text-shadow: var(--glow-cyan); letter-spacing: 2px; display: flex; align-items: center; gap:8px;}
        .brand::before { content: ''; width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; box-shadow: var(--glow-cyan); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .toolbar { display: flex; gap: 15px; align-items: center; }

        .btn-icon {
            width: 40px; height: 40px; border-radius: 8px;
            background: rgba(10, 20, 35, 0.7); border: 1px solid var(--glass-border);
            color: var(--text-main); display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s; backdrop-filter: blur(4px);
        }
        .btn-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .btn-icon:active, .btn-icon.active { background: rgba(0,229,255,0.2); border-color: var(--cyan); color: var(--cyan); box-shadow: var(--glow-cyan); }
        
        .btn-estop { border-color: rgba(255,42,42,0.4); color: var(--red); margin-left:10px; }
        .btn-estop:active { background: rgba(255,42,42,0.2); border-color: var(--red); color: var(--red); box-shadow: var(--glow-red); transform: scale(0.95); }

        .sys-status { display: flex; gap: 15px; font-family: 'Orbitron', monospace; font-size: 0.85rem; }
        .status-badge { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .status-batt { color: var(--yellow); }
        .status-batt.good { color: var(--green); }
        .status-conn { color: var(--red); } /* Initially disconnected */

        /* --- Main Control Area --- */
        .main-area {
            flex: 1; display: flex; justify-content: space-between; align-items: center;
            padding: 5px 30px; position: relative;
        }

        /* Joysticks */
        .joy-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 5; }
        .joy-label { font-family: 'Orbitron', monospace; font-size: 0.75rem; color: var(--text-dim); letter-spacing: 1px; text-align: center; }
        .joy-label span { color: var(--cyan); font-weight: 700; }
        
        .joy-base {
            width: 160px; height: 160px; border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, rgba(10,15,25,0.8), rgba(2,5,10,0.9));
            border: 2px solid rgba(0,229,255,0.15);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 15px rgba(0,229,255,0.05);
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        .joy-base::after { content: ''; position: absolute; width: 60%; height: 60%; border-radius: 50%; border: 1px dashed rgba(0,229,255,0.15); pointer-events: none; }
        
        .joy-stick {
            width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #3a4b66, #121826);
            border: 2px solid var(--blue);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 5px 10px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.2);
            transition: transform 0.1s ease-out; z-index: 10;
        }
        .joy-stick.active {
            border-color: var(--cyan);
            box-shadow: 0 2px 8px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.3), var(--glow-cyan);
        }

        /* Center Console (D-PAD) */
        .center-console {
            display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 1; gap: 15px;
        }

        /* ESC Warning Label */
        .esc-warning {
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--yellow);
            text-align: center; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 4px; border: 1px dashed var(--yellow);
        }

        .dpad { position: relative; width: 140px; height: 140px; }
        .dbtn {
            position: absolute; background: var(--panel-bg); border: 1px solid var(--glass-border);
            color: var(--cyan); display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); transition: 0.1s;
        }
        .dbtn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .dbtn:active { background: var(--cyan); color: #000; box-shadow: var(--glow-cyan); }
        
        .dbtn-up, .dbtn-down { width: 44px; height: 48px; left: 50%; transform: translateX(-50%); }
        .dbtn-left, .dbtn-right { width: 48px; height: 44px; top: 50%; transform: translateY(-50%); }

        .dbtn-up { top: 0; border-radius: 8px 8px 4px 4px; }
        .dbtn-down { bottom: 0; border-radius: 4px 4px 8px 8px; }
        .dbtn-left { left: 0; border-radius: 8px 4px 4px 8px; }
        .dbtn-right { right: 0; border-radius: 4px 8px 8px 4px; }

        .dbtn-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,42,42,0.1); border: 2px solid var(--red); color: var(--red);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: 900;
            z-index: 5; transition: 0.15s; cursor: pointer;
        }
        .dbtn-center:active { background: var(--red); color: #fff; box-shadow: var(--glow-red); transform: translate(-50%, -50%) scale(0.9); }

        /* Floating Camera Module */
        .floating-module {
            position: absolute; top: 65px; left: 50%; transform: translateX(-50%);
            width: 320px; height: 200px;
            background: var(--panel-bg); border: 1px solid var(--glass-border);
            border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,229,255,0.05);
            backdrop-filter: blur(10px); z-index: 20; display: flex; flex-direction: column; overflow: hidden;
            transition: opacity 0.3s, transform 0.3s;
        }
        .floating-module.hidden { opacity: 0; pointer-events: none; transform: translate(-50%, -10px); }
        .module-header {
            padding: 5px 10px; background: rgba(0,229,255,0.1); border-bottom: 1px solid var(--glass-border);
            font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--cyan);
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-close { background: transparent; border: none; color: var(--cyan); cursor: pointer; font-size: 1.2rem; line-height: 1; padding: 0 5px; }
        .module-content { flex: 1; background: #000; position: relative; display: flex; justify-content: center; align-items: center;}
        
        .cam-feed { width: 100%; height: 100%; object-fit: cover; }
        .cam-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,229,255,0.05) 1px, transparent 1px) 0 0 / 100% 4px; pointer-events: none; }

        /* --- Bottom Panel --- */
        .bottom-panel {
            height: 75px; flex-shrink: 0;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(0deg, rgba(0,229,255,0.05) 0%, transparent 100%);
            border-top: 1px solid var(--glass-border);
            padding: 0 20px;
        }

        .speed-module {
            display: flex; align-items: center; gap: 20px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(0,229,255,0.3);
            padding: 5px 20px; border-radius: 30px; backdrop-filter: blur(8px);
        }

        .digital-speed {
            display: flex; align-items: baseline; gap: 4px;
            font-family: 'Orbitron', sans-serif;
            min-width: 90px;
        }
        .speed-val { font-size: 2.2rem; font-weight: 700; color: var(--cyan); text-shadow: var(--glow-cyan); line-height: 1; }
        .speed-unit { font-size: 0.7rem; color: var(--text-dim); }

        .speed-ctrl-wrap { display: flex; align-items: center; gap: 15px; width: 280px; }
        .btn-round {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,229,255,0.1); border: 1px solid var(--cyan);
            color: var(--cyan); display: flex; justify-content: center; align-items: center;
            font-size: 1.4rem; cursor: pointer; transition: 0.1s; user-select: none;
        }
        .btn-round:active { background: var(--cyan); color: #000; box-shadow: var(--glow-cyan); transform: scale(0.9); }

        input[type=range].slider {
            flex: 1; -webkit-appearance: none; background: rgba(0,0,0,0.8); height: 8px; border-radius: 4px;
            border: 1px solid rgba(0,229,255,0.4); outline: none; box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
        }
        input[type=range].slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
            background: var(--cyan); cursor: pointer; box-shadow: var(--glow-cyan);
            border: 2px solid #fff;
        }

        /* Adjustments for smaller screens in landscape */
        @media screen and (max-height: 400px) {
            .joy-base { width: 130px; height: 130px; }
            .joy-stick { width: 45px; height: 45px; }
            .dpad { width: 120px; height: 120px; }
            .dbtn-up, .dbtn-down { width: 38px; height: 42px; }
            .dbtn-left, .dbtn-right { width: 42px; height: 38px; }
            .dbtn-center { width: 38px; height: 38px; font-size: 0.6rem; }
            .bottom-panel { height: 60px; }
            .speed-module { padding: 4px 15px; }
            .speed-val { font-size: 1.8rem; }
            .esc-warning { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <!-- Portrait Overlay -->
    <div id="portrait-overlay">
        <div class="rotate-icon"></div>
        <h2>ROTATE DEVICE</h2>
        <p>Please rotate your device to landscape mode<br>to safely control the rover.</p>
    </div>

    <!-- UI Lock / Disconnected Overlay -->
    <div id="lock-overlay">
        <div class="lock-msg">CONNECTION LOST. ROVER CONTROL DISABLED.</div>
    </div>

    <!-- Connection Modal -->
    <div id="conn-modal">
        <div class="conn-box">
            <h2>LINK VEHICLE</h2>
            <input type="text" id="ip-addr" class="ip-input" placeholder="192.168.4.1" value="192.168.4.1">
            <button class="btn-connect" id="btn-connect">CONNECT SYSTEM</button>
            <div class="conn-status-msg" id="conn-msg"></div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard">
        <!-- Top Toolbar -->
        <header class="top-bar">
            <div class="brand">ROVER::CTRL</div>
            
            <div class="toolbar">
                <div class="btn-icon" id="tgl-light" title="Headlights">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </div>
                <div class="btn-icon" id="tgl-horn" title="Horn">
                    <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </div>
                <div class="btn-icon" id="tgl-cam" title="Optics">
                    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                </div>
                <div class="btn-icon btn-estop" id="btn-estop" title="EMERGENCY STOP">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>
                </div>
            </div>

            <div class="sys-status">
                <div class="status-badge status-batt" id="batt-badge">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect><line x1="23" y1="13" x2="23" y2="11"></line></svg>
                    <span>UNKNOWN</span>
                </div>
                <div class="status-badge status-conn" id="conn-badge">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    <span>DISCONNECTED</span>
                </div>
            </div>
        </header>

        <!-- Floating Camera Module -->
        <div id="module-cam" class="floating-module hidden">
            <div class="module-header">
                <span>OPTICS STREAM</span>
                <button class="btn-close" id="close-cam">&times;</button>
            </div>
            <div class="module-content">
                <div id="cam-loading" style="color:var(--text-dim); font-family:'Orbitron'; font-size:0.8rem;">AWAITING SIGNAL...</div>
                <img id="vid-stream" class="cam-feed" src="" alt="" style="display:none;">
                <div class="cam-overlay"></div>
            </div>
        </div>

        <!-- Main Joysticks & D-Pad Area -->
        <main class="main-area">
            <!-- LEFT JOYSTICK -->
            <div class="joy-wrapper">
                <div class="joy-label">PORT MOTORS (L) <br><span>X: <span id="v-l-x">0</span> Y: <span id="v-l-y">0</span></span></div>
                <div class="joy-base" id="joy-l-base">
                    <div class="joy-stick" id="joy-l-stick"></div>
                </div>
            </div>

            <div class="center-console">
                <div class="esc-warning">FAIL-SAFE LINK ACTIVE</div>
                <div class="dpad">
                    <div class="dbtn dbtn-up" id="dp-up"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg></div>
                    <div class="dbtn dbtn-left" id="dp-left"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></div>
                    <div class="dbtn dbtn-right" id="dp-right"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
                    <div class="dbtn dbtn-down" id="dp-down"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
                    <div class="dbtn-center" id="dp-center">STOP</div>
                </div>
            </div>

            <!-- RIGHT JOYSTICK -->
            <div class="joy-wrapper">
                <div class="joy-label">STRB MOTORS (R) <br><span>X: <span id="v-r-x">0</span> Y: <span id="v-r-y">0</span></span></div>
                <div class="joy-base" id="joy-r-base">
                    <div class="joy-stick" id="joy-r-stick"></div>
                </div>
            </div>
        </main>

        <!-- Bottom Speed Control Panel (Starts at 0, ramps gradually) -->
        <footer class="bottom-panel">
            <div class="speed-module">
                <div class="digital-speed">
                    <span class="speed-val" id="disp-spd">00</span>
                    <span class="speed-unit">PWR%</span>
                </div>
                <div class="speed-ctrl-wrap">
                    <button class="btn-round" id="btn-dec">-</button>
                    <input type="range" class="slider" id="slider-spd" min="0" max="100" value="0">
                    <button class="btn-round" id="btn-inc">+</button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        /**
         * SAFETY, CONFIG & TELEMETRY
         */
        const UPDATE_MS = 80;
        const RAMP_MS = 40;
        const FAILSAFE_TIMEOUT_MS = 1500;
        
        // State
        let baseURL = "";
        let isConnected = false;
        
        let targetSpeed = 0;
        let actualSpeed = 0; // Starts at 0, ramps up
        let lightOn = false;

        let pL_X = 0, pL_Y = 0;
        let pR_X = 0, pR_Y = 0;
        let lastSentL = "", lastSentR = "";

        // Timers & Queue
        let requestQueue = [];
        let isRequestPending = false;
        let lastCommandTime = Date.now();
        let failsafeCheckInt_ID = null;
        let battPollerObj_ID = null;
        
        // Dom Elements
        const connBadge = document.getElementById('conn-badge');
        const battBadge = document.getElementById('batt-badge');
        const lockOverlay = document.getElementById('lock-overlay');
        const dispSpd = document.getElementById('disp-spd');
        const sliderSpd = document.getElementById('slider-spd');

        /**
         * CONNECTION SYSTEM & PING VALIDATION
         */
        document.getElementById('btn-connect').onclick = async () => {
            let ipInput = document.getElementById('ip-addr').value.trim();
            const msgBox = document.getElementById('conn-msg');
            
            // Format URL robustly
            if(!ipInput) { msgBox.innerText = "Error: Invalid IP"; msgBox.style.color = "var(--red)"; return; }
            if(!ipInput.startsWith('http://') && !ipInput.startsWith('https://')) { ipInput = `http://${ipInput}`; }
            if(ipInput.endsWith('/')) { ipInput = ipInput.slice(0, -1); } // Remove trailing slash
            
            baseURL = ipInput;

            msgBox.innerText = `Pinging ESP32 at ${baseURL}...`;
            msgBox.style.color = "var(--cyan)";

            try {
                // Ping endpoint with timeout using fetch
                const aborter = new AbortController();
                const timeoutId = setTimeout(() => aborter.abort(), 2000);
                
                const response = await fetch(`${baseURL}/ping`, { signal: aborter.signal, mode: 'no-cors' });
                clearTimeout(timeoutId);
                
                // If it resolves (even opaque no-cors), assume success
                handleConnectionChange(true);
            } catch (err) {
                msgBox.innerText = "Link Failed. ESP32 Unreachable.";
                msgBox.style.color = "var(--red)";
                handleConnectionChange(false);
            }
        };

        function handleConnectionChange(active) {
            isConnected = active;
            
            if (active) {
                document.getElementById('conn-modal').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                lockOverlay.style.display = 'none';
                
                connBadge.style.color = "var(--green)";
                connBadge.style.textShadow = "var(--glow-green)";
                connBadge.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg><span>CONNECTED</span>`;

                lastCommandTime = Date.now();
                // Ensure zero ESC outputs to start
                queueCommand('/stop');
                targetSpeed = actualSpeed = sliderSpd.value = 0;
                dispSpd.innerText = "00";

                // Start safety watchers
                if(!failsafeCheckInt_ID) failsafeCheckInt_ID = setInterval(checkFailsafe, 500);
                if(!battPollerObj_ID) battPollerObj_ID = setInterval(pollBatteryTelemetry, 2000);
                
            } else {
                lockOverlay.style.display = 'flex';
                connBadge.style.color = "var(--red)";
                connBadge.style.textShadow = "var(--glow-red)";
                connBadge.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg><span>DISCONNECTED</span>`;
            }
        }

        /**
         * NETWORK REQUEST QUEUE MANAGER
         */
        function queueCommand(endpoint) {
            if(!isConnected) return;
            
            // Deduplication (don't stack the same request multiple times in queue)
            if(requestQueue.length > 0 && requestQueue[requestQueue.length-1] === endpoint) {
                return;
            }

            requestQueue.push(endpoint);
            lastCommandTime = Date.now(); // We consider the intention to send as healthy
            processQueue();
        }

        async function processQueue() {
            if(isRequestPending || requestQueue.length === 0 || !isConnected) return;
            
            isRequestPending = true;
            const endpoint = requestQueue.shift();

            try {
                // Wait for the exact fetch request resolution
                await fetch(baseURL + endpoint, { mode: 'no-cors' });
                // Note: no-cors doesn't throw on HTTP errors (like 404/500), but does throw on Network dead
            } catch(e) {
                console.warn(`ESP32 Comm Error: ${e.message}`);
                // Handle serious network drop
                handleConnectionChange(false);
            } finally {
                isRequestPending = false;
                // Recursive exhaust of the queue if more are waiting
                if(requestQueue.length > 0) {
                    processQueue();
                }
            }
        }


        /**
         * CRITICAL FAIL-SAFE RUNAWAY PROTECTION
         */
        function checkFailsafe() {
            if(!isConnected) return;
            const msSinceLast = Date.now() - lastCommandTime;
            
            if(msSinceLast > FAILSAFE_TIMEOUT_MS) {
                console.error("FAILSAFE TRIGGERED: Loss of control detected.");
                targetSpeed = actualSpeed = sliderSpd.value = 0;
                dispSpd.innerText = "00";
                
                // Hard reset joysticks visually
                stopJoystick('joy-l-stick', 'v-l-x', 'v-l-y', (x,y)=>{pL_X=pL_Y=0;});
                stopJoystick('joy-r-stick', 'v-r-x', 'v-r-y', (x,y)=>{pR_X=pR_Y=0;});
                
                // Clear queue immediately and force stop at top priority
                requestQueue = [];
                queueCommand('/stop');
            }
        }

        /**
         * BATTERY TELEMETRY SYSTEM
         */
        async function pollBatteryTelemetry() {
            if(!isConnected) return;
            
            try {
                // Must use manual fetch bypassing queue to not stall controls, and we need CORS handled by ESP32 or use text payload
                const aborter = new AbortController();
                const timeoutId = setTimeout(() => aborter.abort(), 1000);
                
                // Wait for response body (Ensure ESP32 returns simple string like "85")
                const response = await fetch(`${baseURL}/battery`, { signal: aborter.signal });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const textValue = await response.text();
                    const battVal = parseInt(textValue.trim());
                    
                    if(!isNaN(battVal)) {
                        battBadge.classList.add('good');
                        battBadge.style.color = "var(--green)";
                        battBadge.querySelector('span').innerText = `${battVal}%`;
                    }
                }
            } catch (err) {
                // Silently flag UNKNOWN on error rather than crashing
                battBadge.classList.remove('good');
                battBadge.style.color = "var(--yellow)";
                battBadge.querySelector('span').innerText = `UNKNOWN`;
            }
        }


        /**
         * ESC SAFE SPEED RAMPING PROTECTION
         */
        function setTargetSpeed(v) {
            targetSpeed = Math.max(0, Math.min(100, v));
            sliderSpd.value = targetSpeed;
        }

        // Gradual ramp loop to prevent ESC/Motor surging and burning
        setInterval(() => {
            if(!isConnected) return;
            
            if(Math.abs(targetSpeed - actualSpeed) > 0.5) {
                // Lerp formula logic
                actualSpeed += (targetSpeed - actualSpeed) * 0.2;
                
                // Formatting rounding
                const sendVal = Math.round(actualSpeed);
                dispSpd.innerText = sendVal.toString().padStart(2, '0');
                queueCommand(`/speed?value=${sendVal}`);
            } else if (actualSpeed !== targetSpeed) {
                // Snap if it's super close
                actualSpeed = targetSpeed;
                const sendVal = Math.round(actualSpeed);
                dispSpd.innerText = sendVal.toString().padStart(2, '0');
                if(sendVal === 0) queueCommand('/stop'); // Double safety
                else queueCommand(`/speed?value=${sendVal}`);
            }
        }, RAMP_MS);

        document.getElementById('btn-dec').onclick = () => setTargetSpeed(targetSpeed - 5);
        document.getElementById('btn-inc').onclick = () => setTargetSpeed(targetSpeed + 5);
        sliderSpd.oninput = (e) => { setTargetSpeed(parseInt(e.target.value)); };
        sliderSpd.onchange = (e) => { setTargetSpeed(parseInt(e.target.value)); };


        /**
         * SYNCHRONIZED JOYSTICK ENGINE 
         * No duplicates. Safe Clamps.
         */
        function clampAxis(val) { return Math.max(-100, Math.min(100, val)); }

        // Needs to be globally accessible for failsafe to trigger visually
        function stopJoystick(stickId, valXId, valYId, callback) {
            const stick = document.getElementById(stickId);
            stick.classList.remove('active');
            stick.style.transition = 'transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1)';
            stick.style.transform = `translate(-50%, -50%)`;
            document.getElementById(valXId).innerText = "0"; 
            document.getElementById(valYId).innerText = "0";
            callback(0,0);
        }

        function setupJoystick(baseId, stickId, valXId, valYId, callback) {
            const base = document.getElementById(baseId);
            const stick = document.getElementById(stickId);
            const vx = document.getElementById(valXId);
            const vy = document.getElementById(valYId);
            let active = false;

            const handleMove = (e) => {
                if(!active) return;
                e.preventDefault();
                
                const rect = base.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                let dx = cx - centerX;
                let dy = cy - centerY;
                
                const maxRadius = rect.width / 2.2;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist > maxRadius) { dx = (dx / dist) * maxRadius; dy = (dy / dist) * maxRadius; }
                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                
                let outX = clampAxis(Math.round((dx / maxRadius) * 100));
                let outY = clampAxis(Math.round((-dy / maxRadius) * 100));
                
                vx.innerText = outX; vy.innerText = outY;
                callback(outX, outY);
            };

            const start = (e) => { active = true; stick.classList.add('active'); stick.style.transition = 'none'; handleMove(e); };
            const stop = () => { active = false; stopJoystick(stickId, valXId, valYId, callback); };

            base.addEventListener('mousedown', start);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', stop);
            base.addEventListener('touchstart', start, {passive: false});
            window.addEventListener('touchmove', handleMove, {passive: false});
            window.addEventListener('touchend', stop);
        }

        setupJoystick('joy-l-base', 'joy-l-stick', 'v-l-x', 'v-l-y', (x,y) => { pL_X = x; pL_Y = y; });
        setupJoystick('joy-r-base', 'joy-r-stick', 'v-r-x', 'v-r-y', (x,y) => { pR_X = x; pR_Y = y; });

        // Optimized Joystick sender loop (ONLY sends changes)
        setInterval(() => {
            if(!isConnected) return;
            const currL = `${pL_X},${pL_Y}`;
            const currR = `${pR_X},${pR_Y}`;
            
            if(currL !== lastSentL) { queueCommand(`/left?x=${pL_X}&y=${pL_Y}`); lastSentL = currL; }
            if(currR !== lastSentR) { queueCommand(`/right?x=${pR_X}&y=${pR_Y}`); lastSentR = currR; }
        }, UPDATE_MS);

        /**
         * EMERGENCY STOP (CRITICAL)
         */
        const eStopExecute = () => {
            if(!isConnected) return;
            targetSpeed = actualSpeed = sliderSpd.value = 0;
            dispSpd.innerText = "00";
            stopJoystick('joy-l-stick', 'v-l-x', 'v-l-y', (x,y)=>{pL_X=pL_Y=0;});
            stopJoystick('joy-r-stick', 'v-r-x', 'v-r-y', (x,y)=>{pR_X=pR_Y=0;});
            
            requestQueue = []; // Wipe running queue commands
            queueCommand('/stop');
            document.body.style.boxShadow = 'inset 0 0 100px rgba(255,0,0,0.8)';
            setTimeout(() => document.body.style.boxShadow = 'none', 500);
        };
        
        document.getElementById('btn-estop').onclick = eStopExecute;
        document.getElementById('dp-center').onclick = eStopExecute;

        /**
         * TOP TOOLBAR TOGGLES & D-PAD BINDINGS
         */
        document.getElementById('tgl-light').onclick = function() {
            if(!isConnected) return; lightOn = !lightOn; this.classList.toggle('active'); queueCommand('/light');
        };

        const btnHorn = document.getElementById('tgl-horn');
        const applyHorn = (s) => { 
            if(!isConnected) return; 
            if(s) {btnHorn.classList.add('active'); queueCommand('/horn');} 
            else {btnHorn.classList.remove('active');} 
        };
        btnHorn.onmousedown = () => applyHorn(true); btnHorn.onmouseup = () => applyHorn(false); btnHorn.onmouseleave = () => applyHorn(false);
        btnHorn.addEventListener('touchstart', (e)=> {e.preventDefault(); applyHorn(true);}, {passive:false});
        btnHorn.addEventListener('touchend', () => applyHorn(false));

        const bindDp = (id, cmd) => document.getElementById(id).onclick = () => queueCommand(cmd);
        bindDp('dp-up', '/forward'); bindDp('dp-down', '/backward'); bindDp('dp-left', '/leftturn'); bindDp('dp-right', '/rightturn');

        /**
         * STABILIZED CAMERA ESP32-CAM STREAMING (With Retry Loop)
         */
        const modCam = document.getElementById('module-cam');
        const btnTglCam = document.getElementById('tgl-cam');
        const vidStream = document.getElementById('vid-stream');
        const camLoading = document.getElementById('cam-loading');
        
        let camActive = false;
        let camRetryID = null;

        const attemptCamLoad = () => {
            if(!camActive || !baseURL) return;
            
            let camIP = baseURL;
            if((camIP.match(/:/g) || []).length > 1) camIP = camIP.substring(0, camIP.lastIndexOf(':'));
            
            vidStream.src = ""; // Force unload
            setTimeout(() => {
                if(!camActive) return;
                vidStream.src = `${camIP}:81/stream?t=${Date.now()}`;
            }, 100);
        };

        vidStream.onload = () => { if(camActive) { vidStream.style.display = 'block'; camLoading.style.display = 'none'; } };
        vidStream.onerror = () => {
            if(camActive) {
                vidStream.style.display = 'none';
                camLoading.style.display = 'block';
                camLoading.innerText = 'STREAM DROPPED... RETRYING...';
                
                // Auto-retry load every 3 seconds if stream fails
                clearTimeout(camRetryID);
                camRetryID = setTimeout(attemptCamLoad, 3000);
            }
        };

        const toggleCam = (forceClose) => {
            if(!isConnected && !forceClose) return; 
            if(forceClose) camActive = false; else camActive = !camActive;
            
            clearTimeout(camRetryID); // clear loops

            if(camActive) {
                modCam.classList.remove('hidden'); btnTglCam.classList.add('active');
                camLoading.style.display = 'block'; camLoading.innerText = 'AWAITING SIGNAL...';
                attemptCamLoad();
            } else {
                modCam.classList.add('hidden'); btnTglCam.classList.remove('active');
                vidStream.src = ""; vidStream.style.display = 'none';
                camLoading.style.display = 'block'; camLoading.innerText = 'OFFLINE';
            }
        };
        btnTglCam.onclick = () => toggleCam();
        document.getElementById('close-cam').onclick = () => toggleCam(true);

    </script>
</body>
</html>
